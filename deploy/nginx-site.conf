# nginx-Site der Imkereiverwaltung.
# __HTTP_PORT__ / __HTTPS_PORT__ werden vom Installer ersetzt.
#
# HTTPS ist hier kein Luxus: Kamera-Zugriff (Barcode-Scan, Fotos) funktioniert im
# Browser nur in einem "secure context". Über http://<IP> bleibt die Kamera am
# Handy stumm. Der Installer legt dafür ein selbstsigniertes Zertifikat an.

server {
    listen __HTTP_PORT__ default_server;
    listen [::]:__HTTP_PORT__ default_server;
    server_name _;

    # Alles auf HTTPS umbiegen (Port mitnehmen, falls nicht 443).
    location / {
        return 301 https://$host__HTTPS_SUFFIX__$request_uri;
    }
}

server {
    # http2 als listen-Parameter, NICHT als eigene Direktive: `http2 on;` gibt es
    # erst ab nginx 1.25.1, Debian 12 liefert 1.22. Die alte Schreibweise
    # funktioniert in beiden (in neueren mit Veraltet-Hinweis, aber gültig).
    listen __HTTPS_PORT__ ssl http2 default_server;
    listen [::]:__HTTPS_PORT__ ssl http2 default_server;

    server_name _;
    root /var/www/imkerei;
    index index.html;

    ssl_certificate     /etc/ssl/imkerei/server.crt;
    ssl_certificate_key /etc/ssl/imkerei/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:5m;

    client_max_body_size 30m;

    # WebSocket fürs Live-Sync
    location /ws {
        proxy_pass http://127.0.0.1:3000/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 1d;
    }

    # API → Node-Backend
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_request_buffering off;
    }

    # Statische Assets aggressiv cachen
    location ~* \.(png|jpe?g|gif|svg|ico|woff2?|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # App-Code NICHT cachen — sonst zeigt ein Deploy scheinbar keine Wirkung.
    location ~* \.(html|js|css|json)$ {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "same-origin";
}
